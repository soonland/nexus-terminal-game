name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, Typecheck, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app)
        run: npx tsc -b

      - name: Typecheck (api)
        run: npx tsc -p tsconfig.api.json --noEmit

      - name: Format check
        run: npx prettier --check .

      - name: Lint
        run: npx eslint .

      - name: Test with coverage (≥75% threshold)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Dead code check
        run: npm run knip
