name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Lint, Typecheck, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app)
        run: npx tsc -b

      - name: Typecheck (api)
        run: npx tsc -p tsconfig.api.json --noEmit

      - name: Lint
        run: npx eslint api/

      - name: Test with coverage (≥75% threshold)
        run: npm run test:coverage
